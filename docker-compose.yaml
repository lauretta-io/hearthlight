networks:
  mynetwork:

volumes:
  postgres_data:

x-nvidia-env: &nvidia-env
  NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
  NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}

services:
  db:
    image: postgres:13-alpine
    networks:
      - mynetwork
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  rabbitmq:
    image: ${HEARTHLIGHT_RABBITMQ_IMAGE:-hearthlight-rabbitmq:latest}
    build: ./rabbitmq
    networks:
      - mynetwork
    ports:
      - "${RABBITMQ_HOST_BIND:-127.0.0.1}:${RABBITMQ_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_BIND:-127.0.0.1}:${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    restart: unless-stopped
    command: sh /usr/local/bin/init.sh
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  reset_db:
    image: ${HEARTHLIGHT_WEBAPP_IMAGE:-hearthlight-webapp:latest}
    build: ./webapp
    networks:
      - mynetwork
    volumes:
      - ./shared:/app/src/shared
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: >
      bash -c '
      python -um src.shared.database.recreate_db'

  webapp:
    image: ${HEARTHLIGHT_WEBAPP_IMAGE:-hearthlight-webapp:latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build: ./webapp
    networks:
      - mynetwork
    expose:
      - "8000"
      - "3000"
    ports:
      - "${WEBAPP_API_HOST_BIND:-127.0.0.1}:${WEBAPP_API_HOST_PORT:-8000}:8000"
    volumes:
      - ./frontend:/app/src/frontend
      - ./shared:/app/src/shared
      - ./webapp:/app/src/webapp
      - ./anomaly:/app/src/anomaly
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RELOAD=${RELOAD:-}
      - HEARTHLIGHT_LOCAL_STACK=${HEARTHLIGHT_LOCAL_STACK:-true}
      - HEARTHLIGHT_CONFIG_PATH=/app/src/shared/configs/config.yaml
      - HEARTHLIGHT_WORKER_RUNTIME=${HEARTHLIGHT_WORKER_RUNTIME:-docker}
      - HEARTHLIGHT_LOCAL_WORKER_URL=${HEARTHLIGHT_LOCAL_WORKER_URL:-http://host.docker.internal:8070}
      - HEARTHLIGHT_HOST_PROJECT_ROOT=${HEARTHLIGHT_HOST_PROJECT_ROOT:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/readyz')); sys.exit(0 if payload.get('status')=='ready' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: >
      bash -c '
      cd /app/src/frontend &&
      npm ci --no-audit --no-fund &&
      (npm start &) &&
      cd /app &&
      until nc -z rabbitmq 15672; do
        sleep 1; 
      done; 
      python -um src.webapp.run'

  reverse_proxy:
    image: nginx:1.27-alpine
    networks:
      - mynetwork
    ports:
      - "${WEBAPP_UI_HOST_BIND:-127.0.0.1}:${WEBAPP_UI_HOST_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/hearthlight.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      webapp:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ingestor:
    image: ${HEARTHLIGHT_INGESTOR_IMAGE:-hearthlight-ingestor:latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build: ./ingestor
    networks:
      - mynetwork
    volumes:
      - ./shared:/app/src/shared
      - ./ingestor:/app/src/ingestor
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHIM: "1"
      RELOAD: ${RELOAD:-}
      <<: *nvidia-env
    restart: unless-stopped
    command: >
      bash -c '
      until nc -z rabbitmq 15672; do 
        sleep 1; 
      done; 
      if [ ! -z "$RELOAD" ]; then
        hupper -m src.ingestor.main
      else
        python -um src.ingestor.main
      fi'

  reid:
    image: ${HEARTHLIGHT_REID_IMAGE:-hearthlight-reid:latest}
    build: ./reid
    networks:
      - mynetwork
    volumes:
      - ./shared:/app/src/shared
      - ./reid:/app/src/reid
    depends_on:
      rabbitmq:
        condition: service_healthy
      ingestor:
        condition: service_started
    env_file:
      - .env
    environment:
      RELOAD: ${RELOAD:-}
      <<: *nvidia-env
    restart: unless-stopped
    command: >
      bash -c '
      until nc -z rabbitmq 15672; do
        sleep 1; 
      done; 
      if [ ! -z "$RELOAD" ]; then
        hupper -m src.reid.main
      else
        python -um src.reid.main
      fi'

  association:
    image: ${HEARTHLIGHT_ASSOCIATION_IMAGE:-hearthlight-association:latest}
    build: ./association
    networks:
      - mynetwork
    volumes:
      - ./shared:/app/src/shared
      - ./association:/app/src/association
    depends_on:
      rabbitmq:
        condition: service_healthy
      ingestor:
        condition: service_started
      reid:
        condition: service_started
    env_file:
      - .env
    environment:
      - RELOAD=${RELOAD:-}
    restart: unless-stopped
    command: >
      bash -c '
      until nc -z rabbitmq 15672;
      do sleep 1; 
      done; 
      if [ ! -z "$RELOAD" ]; then
        hupper -m src.association.main
      else
        python -um src.association.main
      fi'

  anomaly:
    image: ${HEARTHLIGHT_ANOMALY_IMAGE:-hearthlight-anomaly:latest}
    build: ./anomaly
    networks:
      - mynetwork
    volumes:
      - ./shared:/app/src/shared
      - ./anomaly:/app/src/anomaly
    depends_on:
      rabbitmq:
        condition: service_healthy
      reid:
        condition: service_started
    env_file:
      - .env
    environment:
      RELOAD: ${RELOAD:-}
      <<: *nvidia-env
    restart: unless-stopped
    command: >
      bash -c '
      until nc -z rabbitmq 15672; do
        sleep 1;
      done;
      if [ ! -z "$RELOAD" ]; then
        hupper -m src.anomaly.main
      else
        python -um src.anomaly.main
      fi'
