kafka_default:
  adapter: kafka_json
  enabled: false
  bootstrap_servers:
    - localhost:9092
  topics:
    algorithm: dhs.algorithm
    incidents: dhs.incidents
    entities: dhs.entities
    anomalies: dhs.anomalies
  batch:
    flush_interval_seconds: 5
    max_records: 100
    compression: gzip
    retries: 3
    dead_letter_topic: dhs.algorithm.dlq
