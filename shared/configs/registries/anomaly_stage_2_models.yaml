chatgpt_api_stage_2:
  stage: anomaly_stage_2
  adapter: openai_compatible_stage_2
  artifact_ref: openai-chatgpt-api
  runtime:
    provider: openai
    model_name: gpt-5.4-mini
    model_name_env: OPENAI_MODEL_NAME
    base_url: https://api.openai.com/v1
    base_url_env: OPENAI_BASE_URL
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 30
    prompt_mode: api
  capabilities:
    prompt_support: true
    runtime_targets:
      - remote_api
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    required_env_vars:
      - OPENAI_API_KEY
  requires_gpu: false
  resource_profile:
    cpu_cores: 1
    rate_guidance: moderate

claude_api_stage_2:
  stage: anomaly_stage_2
  adapter: claude_stage_2
  artifact_ref: anthropic-claude-api
  runtime:
    provider: anthropic
    model_name: claude-sonnet-4-6
    model_name_env: ANTHROPIC_MODEL_NAME
    base_url: https://api.anthropic.com/v1
    base_url_env: ANTHROPIC_BASE_URL
    api_key_env: ANTHROPIC_API_KEY
    timeout_seconds: 30
    prompt_mode: api
  capabilities:
    prompt_support: true
    runtime_targets:
      - remote_api
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    required_env_vars:
      - ANTHROPIC_API_KEY
  requires_gpu: false
  resource_profile:
    cpu_cores: 1
    rate_guidance: moderate

lm_studio_stage_2:
  stage: anomaly_stage_2
  adapter: openai_compatible_stage_2
  artifact_ref: lm-studio-openai-compat
  runtime:
    provider: lm_studio
    model_name: local-model
    model_name_env: LM_STUDIO_MODEL_NAME
    base_url: http://localhost:1234/v1
    base_url_env: LM_STUDIO_API_BASE_URL
    api_key_env: LM_STUDIO_API_KEY
    auth_optional: true
    timeout_seconds: 30
    prompt_mode: api
    json_mode: false
  capabilities:
    prompt_support: true
    runtime_targets:
      - local_api
      - remote_api
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck: {}
  requires_gpu: false
  resource_profile:
    cpu_cores: 1
    rate_guidance: moderate

