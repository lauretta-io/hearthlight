smolvlm_stage_2_cpu:
  stage: anomaly_stage_2
  adapter: smolvlm_stage_2
  artifact_ref: smolvlm-stage-2-cpu
  default_for_backend: cpu
  runtime:
    backend: torch
    device: cpu
    model_size_tier: small
    precision: fp32
    prompt_mode: vision-language
  capabilities:
    prompt_support: true
    runtime_targets:
      - cpu
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: hearthlight_model_zoo.anomaly_detectors
  requires_gpu: false
  resource_profile:
    cpu_cores: 2

smolvlm_stage_2_cuda:
  stage: anomaly_stage_2
  adapter: smolvlm_stage_2
  artifact_ref: smolvlm-stage-2-cuda
  default_for_backend: cuda
  runtime:
    backend: torch
    device: cuda:0
    model_size_tier: small
    precision: fp16
    prompt_mode: vision-language
  capabilities:
    prompt_support: true
    runtime_targets:
      - cuda
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  fallback_model_key: smolvlm_stage_2_cpu
  healthcheck:
    import_path: hearthlight_model_zoo.anomaly_detectors
  requires_gpu: true
  resource_profile:
    gpu_memory_mb: 4096

smolvlm_stage_2_mlx:
  stage: anomaly_stage_2
  adapter: smolvlm_stage_2
