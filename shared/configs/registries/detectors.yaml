builtin_rtdetr:
  stage: detector
  adapter: rtdetr_detector
  artifact_ref: dfine-x-1280-pbg
  fallback_model_key: builtin_rtdetr_cpu
  runtime:
    backend: trt
    precision: fp16
    device: cuda:0
  capabilities:
    tasks:
      - PERSON
      - BAG
      - GUN
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: src.shared.model_zoo.detectors
  requires_gpu: true
  resource_profile:
    gpu_memory_mb: 2048

builtin_rtdetr_cpu:
  stage: detector
  adapter: rtdetr_detector
  artifact_ref: dfine-x-1280-pbg
  runtime:
    backend: onnx
    precision: fp32
    device: cpu
  capabilities:
    tasks:
      - PERSON
      - BAG
      - GUN
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: src.shared.model_zoo.detectors
  requires_gpu: false
  resource_profile:
    cpu_cores: 2
