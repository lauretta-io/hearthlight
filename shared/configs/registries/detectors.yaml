builtin_yolox_nano_cpu:
  stage: detector
  adapter: yolox_detector
  artifact_ref: yolox-nano
  runtime:
    backend: torch
    precision: fp32
    device: cpu
  capabilities:
    tasks:
      - PERSON
      - BAG
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: hearthlight_model_zoo.detectors
  requires_gpu: false
  resource_profile:
    cpu_cores: 1

