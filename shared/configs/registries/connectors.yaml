telegram:
  label: Telegram
  description: Deliver trigger notifications through a Telegram bot and chat ID.
  category: messaging
  enabled: true
  requirements:
    - bot-token
    - chat-id
  fields:
    - key: bot_token
      label: Bot token
      secret: true
    - key: chat_id
      label: Chat ID
  delivery_capabilities:
    - text
    - async

apple_messages:
  label: Apple Messages
  description: Deliver trigger notifications through Messages.app on macOS.
  category: messaging
  enabled: true
  requirements:
    - recipient-handle
    - macos
  fields:
    - key: recipient_handle
      label: Recipient handle
    - key: service
      label: Service
  delivery_capabilities:
    - text
    - async

claude_api:
  label: Third-party API (Claude)
  description: Send trigger events to an external API server using Claude-style JSON message payloads.
  category: integrations
  enabled: true
  requirements:
    - base-url
  fields:
    - key: base_url
      label: Base URL
    - key: auth_token
      label: Auth token or secret
      secret: true
    - key: timeout_seconds
      label: Timeout seconds
    - key: retry_count
      label: Retry count
  delivery_capabilities:
    - json
    - sync
    - retry

philips_hue:
  label: Philips Hue Action
  description: Send trigger action payloads to a Philips Hue bridge, scene proxy, or localhost Hue demo receiver.
  category: actions
  enabled: true
  requirements:
    - base-url
  fields:
    - key: base_url
      label: Action URL
    - key: auth_token
      label: Hue app key or bearer token
      secret: true
    - key: command
      label: Command
    - key: target
      label: Light or scene target
  delivery_capabilities:
    - json
    - action
    - sync

music_api:
  label: Music API Action
  description: Send trigger action payloads to a music playback API for alert sounds, playlists, or transport commands.
  category: actions
  enabled: true
  requirements:
    - base-url
  fields:
    - key: base_url
      label: Action URL
    - key: auth_token
      label: Bearer token
      secret: true
    - key: command
      label: Playback command
    - key: target
      label: Track, playlist, or device target
  delivery_capabilities:
    - json
    - action
    - sync

robot_action:
  label: Robot Action
  description: Send structured movement or task commands to a local robot controller or simulator.
  category: actions
  enabled: true
  requirements:
    - base-url
  fields:
    - key: base_url
      label: Controller URL
    - key: auth_token
      label: Bearer token
      secret: true
    - key: command
      label: Robot command
    - key: target
      label: Robot or zone target
  delivery_capabilities:
    - json
    - action
    - sync

webhook:
  label: Webhook
  description: Post trigger payloads to an HTTP endpoint.
  category: integrations
  enabled: true
  requirements:
    - url
  fields:
    - key: url
      label: Target URL
    - key: bearer_token
      label: Bearer token
      secret: true
  delivery_capabilities:
    - json
    - sync

slack:
  label: Slack
  description: Placeholder catalog entry for a future Slack connector.
  category: integrations
  enabled: false
  requirements:
    - webhook-url
  fields:
    - key: webhook_url
      label: Webhook URL
  delivery_capabilities:
    - text
