heuristic_presence_stage_1:
  stage: anomaly_stage_1
  adapter: heuristic_presence_stage_1
  artifact_ref: built_in
  runtime:
    eval_interval: 16
    quiet_period_seconds: 30
    min_track_count: 1
    cooldown_seconds: 60
  capabilities:
    tasks:
      - PERSON
      - BAG
      - GUN
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: src.anomaly.adapters
  requires_gpu: false
  resource_profile:
    cpu_cores: 1
