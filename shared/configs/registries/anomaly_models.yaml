heuristic_presence:
  stage: anomaly
  adapter: heuristic_presence
  artifact_ref: built_in
  runtime:
    quiet_period_seconds: 30
    min_track_count: 1
    cooldown_seconds: 60
  capabilities:
    tasks:
      - PERSON
      - BAG
      - GUN
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: src.anomaly.adapters
  requires_gpu: false
  resource_profile:
    cpu_cores: 1

vlm_anomaly_demo:
  stage: anomaly
  adapter: vlm_anomaly_demo
  artifact_ref: lauretta-io/vlm_anomaly_demo
  runtime:
    package: vlm_anomaly_demo
    model: default
  capabilities:
    tasks:
      - PERSON
      - BAG
      - GUN
    source_kinds:
      - camera_url
      - video_upload
      - webcam
  healthcheck:
    import_path: vlm_anomaly_demo
  requires_gpu: false
  resource_profile:
    cpu_cores: 2
