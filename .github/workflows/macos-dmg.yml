name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # python-tk installs the Tk binding; the interpreter is Homebrew python@3.11 (python-tk has no bin).
      - name: Install Python with Tkinter (Homebrew)
        run: brew install python-tk@3.11

      - name: Configure Python for build
        run: |
          PY_BIN="$(brew --prefix python@3.11)/bin/python3.11"
          echo "$PY_BIN"
          "$PY_BIN" --version
          "$PY_BIN" -c "import tkinter; print('tkinter ok')"
          echo "PYTHON_BIN=$PY_BIN" >> "$GITHUB_ENV"
          echo "$(brew --prefix python@3.11)/bin" >> "$GITHUB_PATH"

      - name: Install packaging dependencies
        run: |
          "${PYTHON_BIN}" -m pip install --upgrade pip

      - name: Build macOS app bundle
        run: bash scripts/build_macos_app.sh

      - name: Package DMG
        run: bash scripts/package_macos_dmg.sh

      - name: Import signing certificate
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_DEVELOPER_IDENTITY:-}" ] || [ -z "${APPLE_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Skipping certificate import (signing secrets not configured)."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/hearthlight-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/hearthlight-signing.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${APPLE_CERTIFICATE_PASSWORD:-}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign and notarize DMG
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_DEVELOPER_IDENTITY:-}" ] \
            || [ -z "${APPLE_ID:-}" ] \
            || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] \
            || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Skipping sign/notarize (Apple signing secrets not fully configured)."
            exit 0
          fi
          bash scripts/sign_and_notarize_macos_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hearthlight-macOS-dmg
          path: |
            dist/Hearthlight.app
            dist/Hearthlight.dmg

      - name: Publish release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Hearthlight.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
